<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Gracias | Desarmaduría La Martina
    </title>

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Montserrat',sans-serif;

            background:
            linear-gradient(
                rgba(0,0,0,.80),
                rgba(0,0,0,.90)
            ),
            url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=2000&q=80');

            background-size:cover;
            background-position:center;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:20px;

            color:white;

        }

        .container{

            background:rgba(15,15,15,.95);

            border:1px solid rgba(255,193,7,.20);

            max-width:700px;

            width:100%;

            padding:60px;

            text-align:center;

            box-shadow:
                0 20px 60px rgba(0,0,0,.5);

            position:relative;

            overflow:hidden;

        }

        .container::before{

            content:"";

            position:absolute;

            top:0;
            left:0;

            width:100%;
            height:5px;

            background:#ffc107;

        }

        .icon{

            width:100px;
            height:100px;

            margin:0 auto 30px;

            background:#ffc107;

            border-radius:50%;

            display:flex;

            align-items:center;

            justify-content:center;

            color:black;

            font-size:3rem;

        }

        .tag{

            color:#ffc107;

            letter-spacing:4px;

            text-transform:uppercase;

            font-size:13px;

            margin-bottom:20px;

            display:block;

        }

        h1{

            font-family:'Oswald',sans-serif;

            font-size:4rem;

            line-height:1;

            margin-bottom:25px;

        }

        p{

            color:#c9c9c9;

            font-size:1.1rem;

            line-height:1.8;

            margin-bottom:40px;

        }

        .buttons{

            display:flex;

            justify-content:center;

            gap:20px;

            flex-wrap:wrap;

        }

        .btn-primary{

            background:#ffc107;

            color:black;

            padding:18px 35px;

            text-decoration:none;

            font-weight:700;

            transition:.3s;
        }

        .btn-primary:hover{

            background:white;

            transform:translateY(-3px);

        }

        .btn-secondary{

            border:2px solid white;

            color:white;

            padding:18px 35px;

            text-decoration:none;

            font-weight:700;

            transition:.3s;

        }

        .btn-secondary:hover{

            background:white;

            color:black;

        }

        @media(max-width:768px){

            .container{
                padding:40px 25px;
            }

            h1{
                font-size:2.5rem;
            }

            p{
                font-size:1rem;
            }

            .buttons{
                flex-direction:column;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <div class="icon">

            <i class="bi bi-check-lg"></i>

        </div>

        <span class="tag">

            MENSAJE RECIBIDO

        </span>

        <h1>

            ¡GRACIAS!

        </h1>

        <p>

            Hemos recibido tu mensaje correctamente.
            Nuestro equipo se pondrá en contacto contigo
            a la brevedad para ayudarte con tu consulta.

        </p>

        <div class="buttons">

            <a href="index.html"
               class="btn-primary">

                VOLVER AL INICIO

            </a>

            <a href="https://wa.me/56920656819"
               target="_blank"
               class="btn-secondary">

                ESCRIBIR POR WHATSAPP

            </a>

        </div>

    </div>

</body>

</html>
